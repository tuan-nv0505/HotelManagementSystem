<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý dịch vụ</title>
</head>
<body th:replace="~{layout/base :: main('roomType', ~{:: #roomType-content})}">

<div id="roomType-content">
    <div id="tableContainer" th:fragment="roomtype-table-fragment">
        <div class="table-responsive border shadow-sm bg-white">
            <table class="table table-striped table-hover mb-0 align-middle text-center">
                <thead class="table-dark">
                <tr>
                    <th colspan="8">
                        <div class="d-flex align-items-center gap-3 w-100 py-1">
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold" data-bs-toggle="modal" data-bs-target="#addRoomTypeModal">
                                    Thêm
                                </button>
                                <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                        th:onclick="|deleteMulti('@{/api/room-types}', 'roomType')|">
                                    Xoá
                                </button>
                            </div>

                            <div class="mx-auto" style="min-width: 250px; max-width: 600px;">
                                <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                    <input type="text" name="kw" th:value="${kw}" class="form-control form-control-sm rounded-0 shadow-none" placeholder="Tên dịch vụ...">
                                    <input type="number" name="fromPrice" th:value="${fromPrice}" class="form-control form-control-sm rounded-0 shadow-none" placeholder="Từ giá" min="0">
                                    <input type="number" name="toPrice" th:value="${toPrice}" class="form-control form-control-sm rounded-0 shadow-none" placeholder="Đến giá" min="0">
                                    <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                                </form>
                            </div>
                        </div>
                    </th>
                </tr>
                <tr>
                    <th style="width: 40px; vertical-align: middle;">
                        <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-roomType')"
                               id="selectAllRoomType">
                    </th>
                    <th class="text-start">Tên loại phòng</th>
                    <th>Giá tiêu chuẩn</th>
                    <th>Sức chứa</th>
                    <th>Mô tả</th>
                    <th>Ảnh minh hoạ</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="rt : ${listRoomType}">
                    <td style="vertical-align: middle;">
                        <input type="checkbox" class="action-select-roomType"
                               onclick="resetSelectAllCheckBox('selectAllRoomType', 'action-select-roomType')">
                    </td>
                    <td hidden th:text="${rt.id}"></td>
                    <td class="text-start fw-bold" th:text="${rt.name}"></td>
                    <td th:text="${#numbers.formatDecimal(rt.basePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="text-start fw-bold" th:text="${rt.capacity}"></td>
                    <td class="text-start fw-bold" th:text="${rt.description}"></td>
                    <td style="vertical-align: middle;">
                        <img th:src="${rt.image != null && !rt.image.isEmpty() ? rt.image : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                             alt="Image"
                             style="width: 100px; height: 100px; object-fit: cover;">
                    </td>
                    <td>
                        <span th:if="${rt.active}">Còn sử dụng</span>
                        <span th:unless="${rt.active}">Không sử dụng</span>
                    </td>
                    <td>
                        <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                                th:data-id="${rt.id}"
                                th:data-name="${rt.name}"
                                th:data-price="${rt.basePrice}"
                                th:data-capacity="${rt.capacity}"
                                th:data-description="${rt.description}"
                                th:data-image="${rt.image}"
                                th:data-active="${rt.active}"
                                onclick="openEditModal(this, 'RoomType')">
                            Sửa
                        </button>

                        <button th:id="|deleteRoomType-${rt.id}|" th:onclick="|deleteDetail('@{/api/room-types/{id}(id=${rt.id})}')|" type="button" class="btn btn-sm btn-danger rounded-0 fw-bold">Xoá</button>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(listRoomType)}">
                    <td colspan="8" class="text-muted py-4">Chưa có loại phòng nào trong hệ thống.</td>
                </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-center p-2 border-top bg-light"
                 th:if="${not #lists.isEmpty(listPage)}">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:each="page : ${listPage}">
                        <a class="page-link py-1 shadow-none"
                           th:href="@{/admin/room-types(page=${page},kw=${kw},fromPrice=${fromPrice},toPrice=${toPrice})}"
                           th:text="${page}">
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>

    <div th:replace="~{modals/base :: genericModal('addRoomTypeModal', 'Thêm mới loại phòng', ~{modals/room_type_form :: roomTypeForm('add')})}"></div>
    <div th:replace="~{modals/base :: genericModal('editRoomTypeModal', 'Sửa loại phòng', ~{modals/room_type_form :: roomTypeForm('edit')})}"></div>

</div>
</body>
</html>
