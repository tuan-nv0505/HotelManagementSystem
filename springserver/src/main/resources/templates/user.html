<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý người dùng</title>
</head>
<body th:replace="~{layout/base :: main('user', ~{:: #user-content})}">

<div id="user-content">
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="8">
                    <div class="d-flex align-items-center gap-3 w-100 py-1">
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold"
                                    data-bs-toggle="modal" data-bs-target="#addUserModal">
                                Thêm
                            </button>
                            <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                    th:onclick="|deleteMulti('@{/api/users}', 'user')|">
                                Xoá
                            </button>
                        </div>

                        <div class="mx-auto" style="min-width: 250px; max-width: 600px;">
                            <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                <input type="text" name="kw" th:value="${kw}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Tên đăng nhập...">
                                <input type="text" name="phone" th:value="${phone}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Số điện thoại...">
                                <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                            </form>
                        </div>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-user')"
                           id="selectAllUser">
                </th>
                <th>Avatar</th>
                <th class="text-start">Tên đăng nhập</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Vai trò</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${listUsers}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-user"
                           th:value="${user.id}"
                           th:data-id="${user.id}"
                           th:data-avatar="${user.avatar}"
                           th:data-username="${user.username}"
                           th:data-email="${user.email}"
                           th:data-phone="${user.phone}"
                           th:data-role="${user.role}"
                           th:data-active="${user.active}"
                           onclick="resetSelectAllCheckBox('selectAllUser', 'action-select-user')">
                </td>
                <td style="vertical-align: middle;">
                    <img th:src="${user.avatar != null && !user.avatar.isEmpty() ? user.avatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                         alt="Avatar" class="rounded-circle border"
                         style="width: 40px; height: 40px; object-fit: cover;">
                </td>
                <td hidden th:text="${user.id}"></td>
                <td class="text-start fw-bold" th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.phone}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <span th:if="${user.active}">Hoạt động</span>
                    <span th:unless="${user.active}">Bị khóa</span>
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${user.id}"
                            th:data-avatar="${user.avatar}"
                            th:data-username="${user.username}"
                            th:data-email="${user.email}"
                            th:data-phone="${user.phone}"
                            th:data-role="${user.role}"
                            th:data-active="${user.active}"
                            onclick="openEditModal(this,'User')">
                        Sửa
                    </button>

                    <button th:id="|deleteUser-${user.id}|"
                            th:onclick="|deleteDetail('@{/api/users/{id}(id=${user.id})}')|" type="button"
                            class="btn btn-sm btn-danger rounded-0 fw-bold">Xoá
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(listUsers)}">
                <td colspan="8" class="text-muted py-4">Chưa có người dùng nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-center p-2 border-top bg-light"
             th:if="${not #lists.isEmpty(listPage)}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:each="page : ${listPage}">
                    <a class="page-link py-1 shadow-none"
                       th:href="@{/admin/users(page=${page},kw=${kw})}"
                       th:text="${page}">
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addUserModal',
        'Thêm mới người dùng',
        ~{modals/user_form :: userForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editUserModal',
        'Sửa thông tin người dùng',
        ~{modals/user_form :: userForm('edit')}
    )}"></div>

</div>
</body>
</html>
