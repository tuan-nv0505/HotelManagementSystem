<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý dịch vụ</title>
</head>
<body th:replace="~{layout/base :: main('service', ~{:: #service-content})}">

<div id="service-content">
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="5">
                    <div class="d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                                data-bs-toggle="modal" data-bs-target="#addServiceModal">
                            Thêm
                        </button>
                        <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                onclick="deleteSelectedServices()">
                            Xoá
                        </button>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-service')"
                           id="selectAllService">
                </th>
                <th class="text-start">Tên dịch vụ</th>
                <th>Giá tiêu chuẩn</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${listService}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-service" th:value="${service.id}"
                           onclick="resetSelectAllCheckBox('selectAllService', 'action-select-service')">
                </td>
                <td hidden th:text="${s.id}"></td>
                <td class="text-start fw-bold" th:text="${s.name}"></td>
                <td th:text="${#numbers.formatDecimal(s.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td>
                    <span th:if="${s.active}">Còn sử dụng</span>
                    <span th:unless="${s.active}">Không sử dụng</span>
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${s.id}"
                            th:data-name="${s.name}"
                            th:data-price="${s.price}"
                            th:data-active="${s.active}"
                            onclick="openEditServiceModal(this)">
                        Sửa
                    </button>

                    <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                            th:onclick="'deleteService(' + ${service.id} + ')'">Xoá
                    </button>


                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(listService)}">
                <td colspan="5" class="text-muted py-4">Chưa có dịch vụ nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addServiceModal',
        'Thêm mới dịch vụ',
        ~{modals/service_form :: serviceForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editServiceModal',
        'Sửa dịch vụ',
        ~{modals/service_form :: serviceForm('edit')}
    )}"></div>

</div>
</body>
</html>
