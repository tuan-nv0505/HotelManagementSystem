<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý khách hàng</title>
</head>
<body th:replace="~{layout/base :: main('customer', ~{:: #customer-content})}">

<div id="customer-content">
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="8">
                    <div class="d-flex align-items-center gap-3 w-100 py-1">
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold" data-bs-toggle="modal"
                                    data-bs-target="#addCustomerModal">
                                Thêm
                            </button>
                            <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                    th:onclick="|deleteMulti('@{/api/customers}', 'customer')|">
                                Xoá
                            </button>
                        </div>

                        <div class="mx-auto" style="min-width: 250px; max-width: 600px;">
                            <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                <input type="text" name="kw" th:value="${kw}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Tên khách hàng...">
                                <input type="text" name="phone" th:value="${phone}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Số điện thoại khách hàng...">
                                <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                            </form>
                        </div>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-customer')"
                           id="selectAllCustomer">
                </th>
                <th class="text-start">Tên khách hàng</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Địa chỉ</th>
                <th>Loại khách hàng</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c: ${listCustomer}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-customer"
                           th:value="${c.id}"
                           th:data-id="${c.id}"
                           th:data-name="${c.name}"
                           th:data-email="${c.email}"
                           th:data-phone="${c.phone}"
                           th:data-user="${c.userId != null ? c.userId : ''}"
                           th:data-address="${c.address}"
                           th:data-active="${c.active}"
                           onclick="resetSelectAllCheckBox('selectAllCustomer', 'action-select-customer')">
                </td>
                <td hidden th:text="${c.id}"></td>
                <td class="text-start fw-bold" th:text="${c.name}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.phone}"></td>
                <td th:text="${c.address}"></td>
                <td>
                    <span th:if="${c.userId}">Khách hàng thành viên</span>
                    <span th:unless="${c.userId}">Khách hàng vãng lai</span>
                </td>
                <td>
                    <span th:if="${c.active}">Còn hoạt động</span>
                    <span th:unless="${c.active}">Không hoạt động</span>
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${c.id}"
                            th:data-name="${c.name}"
                            th:data-email="${c.email}"
                            th:data-phone="${c.phone}"
                            th:data-address="${c.address}"
                            th:data-user="${c.userId != null ? c.userId : ''}"
                            th:data-active="${c.active}"
                            onclick="openEditModal(this,'Customer')">
                        Sửa
                    </button>

                    <button th:id="|deleteCustomer-${c.id}|"
                            th:onclick="|deleteDetail('@{/api/customers/{id}(id=${c.id})}')|" type="button"
                            class="btn btn-sm btn-danger rounded-0 fw-bold">Xoá
                    </button>


                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(listCustomer)}">
                <td colspan="8" class="text-muted py-4">Chưa có khách hàng nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-center p-2 border-top bg-light"
             th:if="${not #lists.isEmpty(listPage)}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:each="page : ${listPage}">
                    <a class="page-link py-1 shadow-none"
                       th:href="@{/admin/customers(page=${page},kw=${kw})}"
                       th:text="${page}">
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addCustomerModal',
        'Thêm mới khách hàng',
        ~{modals/customer_form :: customerForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editCustomerModal',
        'Sửa thông tin khách hàng',
        ~{modals/customer_form :: customerForm('edit')}
    )}"></div>

</div>
</body>
</html>
