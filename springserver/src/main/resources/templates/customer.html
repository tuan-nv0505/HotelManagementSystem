<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý khách hàng</title>
</head>
<body th:replace="~{layout/base :: main('customer', ~{:: #customer-content})}">

<div id="customer-content">
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="7">
                    <div class="d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                                data-bs-toggle="modal" data-bs-target="#addCustomerModal">
                            Thêm
                        </button>
                        <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                onclick="deleteSelectedCustomers()">
                            Xoá
                        </button>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-customer')"
                           id="selectAllCustomer">
                </th>
                <th class="text-start">Tên khách hàng</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Địa chỉ</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="customer : ${listCustomers}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-customer"
                           onclick="resetSelectAllCheckBox('selectAllCustomer', 'action-select-customer')">
                </td>
                <td class="text-start fw-bold" th:text="${customer.name}"></td>
                <td th:text="${customer.email}"></td>
                <td th:text="${customer.phone}"></td>
                <td th:text="${customer.address}"></td>
                <td>
                    <span th:if="${customer.active}">Còn hoạt động</span>
                    <span th:unless="${customer.active}">Không còn hoạt động!</span>
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            data-bs-toggle="modal"
                            th:data-bs-target="'#editCustomerModal-' + ${customer.id}">
                        Sửa
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-danger rounded-0 fw-bold"
                            th:onclick="'deleteCustomer(' + ${customer.id} + ')'">Xoá
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listCustomers)}">
                <td colspan="7" class="text-muted py-4">Chưa có khách hàng nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <th:block th:each="customer : ${listCustomers}">
        <div th:replace="~{modals/base :: genericModal(
                'editCustomerModal-' + ${customer.id},
                'Sửa thông tin khách hàng',
                ~{modals/customer_fields :: customerBody(${customer})},
                ~{modals/customer_fields :: customerFooter},
                '/admin/customers/update'
            )}"></div>
    </th:block>

    <div th:replace="~{modals/base :: genericModal(
        'addCustomerModal',
        'Thêm mới khách hàng',
        ~{modals/customer_fields :: customerBody(null)},
        ~{modals/customer_fields :: customerFooter},
        '/admin/customer/save'
    )}"></div>
</div>
</body>
</html>
