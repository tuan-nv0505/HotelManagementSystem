<div th:fragment="serviceBody(service)">
    <input type="hidden" name="id" th:value="${service?.id}">

    <div class="row mb-3 align-items-center">
        <label class="col-sm-3 col-form-label text-end fw-bold small">Tên dịch vụ:</label>
        <div class="col-sm-9">
            <input type="text" name="name" th:value="${service?.name}"
                   class="form-control form-control-sm rounded-0 shadow-none" placeholder="Nhập tên dịch vụ" required>
        </div>
    </div>

    <div class="row mb-3 align-items-center">
        <label class="col-sm-3 col-form-label text-end fw-bold small">Giá tiêu chuẩn:</label>
        <div class="col-sm-9">
            <input type="number" name="price" th:value="${service?.price}"
                   class="form-control form-control-sm rounded-0 shadow-none" placeholder="VD: 50000" min="0" required>
        </div>
    </div>

    <div class="row mb-3 align-items-center">
        <label class="col-sm-3 col-form-label text-end fw-bold small">Trạng thái:</label>
        <div class="col-sm-9 d-flex align-items-center">
            <div class="form-check form-check-inline mb-0">
                <input class="form-check-input shadow-none" type="radio" name="active"
                       th:id="'activeTrue-' + ${service != null ? service.id : 'add'}" value="true"
                       th:checked="${service == null || service.active}" required>
                <label class="form-check-label user-select-none"
                       th:for="'activeTrue-' + ${service != null ? service.id : 'add'}">Còn sử dụng</label>
            </div>
            <div class="form-check form-check-inline mb-0">
                <input class="form-check-input shadow-none" type="radio" name="active"
                       th:id="'activeFalse-' + ${service != null ? service.id : 'add'}" value="false"
                       th:checked="${service != null && !service.active}">
                <label class="form-check-label user-select-none"
                       th:for="'activeFalse-' + ${service != null ? service.id : 'add'}">Không sử dụng</label>
            </div>
        </div>
    </div>
</div>

<div th:fragment="serviceFooter">
    <button type="button" class="btn btn-outline-secondary btn-sm px-4 rounded-0" data-bs-dismiss="modal">Hủy</button>
    <button type="submit" class="btn btn-dark btn-sm px-4 rounded-0 fw-bold">Lưu thay đổi</button>
</div>
