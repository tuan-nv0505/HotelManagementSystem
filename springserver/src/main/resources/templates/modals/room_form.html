<div th:fragment="roomForm(type)">
    <form method="POST" th:action="@{/admin/rooms}" th:object="${roomDTO}">
        <div class="modal-body p-4">
            <input type="hidden" name="id" th:id="${type + 'RoomId'}">

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Số phòng:</label>
                <div class="col-sm-9">
                    <input type="text" name="roomNumber"
                           th:id="${type + 'RoomRoomnumber'}"
                           class="form-control form-control-sm rounded-0 shadow-none" placeholder="Nhập số phòng (VD: P101)" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Tầng:</label>
                <div class="col-sm-9">
                    <input type="number" name="floor"
                           th:id="${type + 'RoomFloor'}"
                           class="form-control form-control-sm rounded-0 shadow-none" placeholder="VD: 1, 2, 3" min="0" required>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">
                    Loại phòng:
                </label>
                <div class="col-sm-9">
                    <select name="typeId"
                            th:id="${type + 'RoomTypeid'}"
                            class="form-select form-select-sm rounded-0 shadow-none"
                            required>
                        <option value="">-- Chọn loại phòng --</option>
                        <option th:each="rt: ${listRoomType}" th:value="${rt.id}" th:text="${rt.name}"></option>
                    </select>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">
                    Trạng thái (Status):
                </label>
                <div class="col-sm-9">
                    <select name="status"
                            th:id="${type + 'RoomStatus'}"
                            class="form-select form-select-sm rounded-0 shadow-none"
                            required>
                        <option value="">-- Chọn trạng thái --</option>
                        <option th:each="status: ${listStatus}" th:value="${status}" th:text="${status.value}"></option>
                    </select>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">
                    Tình trạng (Availability):
                </label>
                <div class="col-sm-9">
                    <select name="availabilityStatus"
                            th:id="${type + 'RoomAvailabilitystatus'}"
                            class="form-select form-select-sm rounded-0 shadow-none"
                            required>
                        <option value="">-- Chọn trạng thái --</option>
                        <option th:each="status: ${listAvailabilityStatus}" th:value="${status}" th:text="${status.value}"></option>
                    </select>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <label class="col-sm-3 col-form-label text-end fw-bold small">Kích hoạt:</label>
                <div class="col-sm-9">
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input shadow-none" type="checkbox" name="active" value="true"
                               th:id="${type + 'RoomActive'}">
                        <label class="form-check-label user-select-none fw-semibold small text-secondary" th:for="${type + 'ActiveCheckbox'}">
                            Tích chọn để kích hoạt phòng (Còn sử dụng)
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer bg-light py-2 border-top-0 d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary btn-sm px-4 rounded-0" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-dark btn-sm px-4 rounded-0 fw-bold">Lưu thay đổi</button>
        </div>
    </form>
</div>
