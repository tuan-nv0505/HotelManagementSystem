<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý chi tiết phòng đặt</title>
</head>
<body th:replace="~{layout/base :: main('booking_room', ~{:: #booking-room-content})}">

<div id="booking-room-content">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="5">
                    <div class="d-flex align-items-center gap-3 w-100 py-1">

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold"
                                    data-bs-toggle="modal" data-bs-target="#addBookingRoomModal">
                                Thêm phòng
                            </button>
                            <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                    th:onclick="|deleteMulti('@{/api/booking-rooms}', 'booking-room')|">
                                Xoá
                            </button>
                        </div>

                        <div class="mx-auto" style="min-width: 250px; max-width: 400px;">
                            <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                <input type="text" name="customerName" th:value="${customerName}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Tên khách hàng...">

                                <input type="text" name="roomName" th:value="${roomName}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Số phòng...">
                                <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                            </form>
                        </div>

                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-booking-room')"
                           id="selectAllBookingRoom">
                </th>
                <th>Khách hàng đặt phòng</th>
                <th>Số phòng</th>
                <th>Giá lúc đặt</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="br : ${bookingRooms}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-booking-room"
                           th:value="${br.id}"
                           th:data-id="${br.id}"
                           th:data-bookingid="${br.bookingId}"
                           th:data-roomid="${br.roomId}"
                           th:data-priceatbooking="${br.priceAtBooking}"
                           onclick="resetSelectAllCheckBox('selectAllBookingRoom', 'action-select-booking-room')">
                </td>
                <td class="fw-bold text-secondary" th:text="'#' + ${br.bookingCustomerName}"></td>

                <td class="fw-bold text-dark" th:text="'Phòng ' + ${br.roomName}"></td>

                <td class="fw-bold text-danger"
                    th:text="${#numbers.formatDecimal(br.priceAtBooking, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${br.id}"
                            th:data-bookingid="${br.bookingId}"
                            th:data-roomid="${br.roomId}"
                            th:data-priceatbooking="${br.priceAtBooking}"
                            onclick="openEditModal(this, 'BookingRoom')">
                        Sửa
                    </button>

                    <button th:id="|deleteBookingRoom-${br.id}|"
                            th:onclick="|deleteDetail('@{/api/booking-rooms/{id}(id=${br.id})}')|" type="button"
                            class="btn btn-sm btn-outline-danger rounded-0 fw-bold">Xoá
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(bookingRooms)}">
                <td colspan="5" class="text-muted py-4">Chưa có phòng nào được gán vào đơn đặt trong hệ thống.</td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-center p-2 border-top bg-light"
             th:if="${not #lists.isEmpty(listPage)}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:each="page : ${listPage}">
                    <a class="page-link py-1 shadow-none"
                       th:href="@{/admin/booking-rooms(page=${page},customerName=${customerName} ,roomName=${roomName})}"
                       th:text="${page}">
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addBookingRoomModal',
        'Gán thêm phòng vào đơn đặt',
        ~{modals/booking_room_form :: bookingRoomForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editBookingRoomModal',
        'Sửa thông tin phòng đặt',
        ~{modals/booking_room_form :: bookingRoomForm('edit')}
    )}"></div>

</div>
</body>
</html>
