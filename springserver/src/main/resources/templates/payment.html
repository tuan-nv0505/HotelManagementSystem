<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý thanh toán</title>
</head>
<body th:replace="~{layout/base :: main('payment', ~{:: #payment-content})}">

<div id="payment-content">
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="7">
                    <div class="d-flex align-items-center gap-3 w-100 py-1">
                        <div class="mx-auto" style="min-width: 250px; max-width: 600px;">
                            <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                <input type="text" name="kw" th:value="${kw}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Mã giao dịch...">
                                <input type="text" name="staff" th:value="${staff}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Nhân viên phụ trách...">
                                <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                            </form>
                        </div>
                    </div>
                </th>
            </tr>
            <tr>
                <th>Khách hàng thanh toán</th>
                <th>Nhân viên phụ trách</th>
                <th class="text-start">Mã giao dịch</th>
                <th>Phương thức</th>
                <th>Loại giao dịch</th>
                <th>Số tiền</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="payment : ${payments}">
                <td class="fw-bold text-secondary" th:text="'#' + ${payment.bookingCustomerName}"></td>
                <td th:text="${payment.staffUsername}"></td>
                <td class="text-start font-monospace small"
                    th:text="${payment.transactionCode != null ? payment.transactionCode : 'N/A'}"></td>

                <td th:text="${payment.paymentMethod}"></td>

                <td>
                    <span th:if="${payment.paymentContext == 'PAYMENT'}"
                          class="badge bg-info text-dark">Thanh toán</span>
                    <span th:unless="${payment.paymentContext == 'PAYMENT'}" class="badge bg-secondary">Hoàn tiền</span>
                </td>

                <td class="fw-bold text-dark"
                    th:text="${#numbers.formatDecimal(payment.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                <td>
                    <span th:if="${payment.status == 'COMPLETED'}" class="badge bg-success">Thành công</span>
                    <span th:if="${payment.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ duyệt</span>
                    <span th:if="${payment.status == 'FAILED'}" class="badge bg-danger">Thất bại</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(payments)}">
                <td colspan="8" class="text-muted py-4">Chưa có dữ liệu giao dịch nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
