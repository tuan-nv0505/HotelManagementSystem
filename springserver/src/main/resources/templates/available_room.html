<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}"><title></title></head>
<body th:replace="~{layout/base :: main('availabelRoom', ~{:: #room-content})}">

<div id="room-content">

    <div class="card mb-3 rounded-0 shadow-sm border">
        <div class="card-body">
            <form th:action="@{/admin/available-rooms}" method="get">
                <div class="row g-3 align-items-end">

                    <div class="col-md-4">
                        <label for="roomTypeId" class="form-label fw-bold text-secondary">Loại phòng</label>
                        <select id="roomTypeId" name="roomTypeId" class="form-select rounded-0">
                            <option value="">Tất cả loại phòng</option>
                            <option th:each="type : ${listRoomType}"
                                    th:value="${type.id}"
                                    th:text="${type.name}"
                                    th:selected="${param.roomTypeId != null and param.roomTypeId[0] == type.id.toString()}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label for="expectedCheckIn" class="form-label fw-bold text-secondary">Ngày dự kiến nhận phòng</label>
                        <input type="date" id="expectedCheckIn" name="expectedCheckIn" class="form-control rounded-0" th:value="${param.expectedCheckIn}">
                    </div>

                    <div class="col-md-4">
                        <label for="expectedCheckOut" class="form-label fw-bold text-secondary">Ngày dự kiến trả phòng</label>
                        <input type="date" id="expectedCheckOut" name="expectedCheckOut" class="form-control rounded-0" th:value="${param.expectedCheckOut}">
                    </div>

                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary rounded-0 px-4">
                            <i class="fa fa-search"></i> Tìm kiếm
                        </button>
                        <a th:href="@{/admin/available-rooms}" class="btn btn-secondary rounded-0 px-4 ms-2">Bỏ lọc</a>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle">
            <thead class="table-dark">
            <tr>
                <th class="text-start">Mã phòng</th>
                <th class="text-start">phòng</th>
                <th>Tầng</th>
                <th>Loại phòng</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${listRoom}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.roomNumber}"></td>
                <td th:text="${r.floor}"></td>
                <td th:text="${r.typeName}"></td>
            </tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-center p-2 border-top bg-light"
             th:if="${not #lists.isEmpty(listPage)}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:each="page : ${listPage}">
                    <a class="page-link py-1 shadow-none"
                       th:href="@{/admin/available-rooms(page=${page},roomTypeId=${roomTypeId},expectedCheckIn=${expectedCheckIn},expectedCheckOut=${expectedCheckIn})}"
                       th:text="${page}">
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
