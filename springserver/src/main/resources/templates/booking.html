<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head}">
    <title>Quản lý đặt phòng</title>
</head>
<body th:replace="~{layout/base :: main('booking', ~{:: #booking-content})}">

<div id="booking-content">
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-0 py-2 small mb-3"
         role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close py-2 shadow-none" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div class="table-responsive border shadow-sm">
        <table class="table table-striped table-hover mb-0 align-middle text-center">
            <thead class="table-dark">
            <tr>
                <th colspan="10">
                    <div class="d-flex align-items-center gap-3 w-100 py-1">
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-dark rounded-0 fw-bold"
                                    data-bs-toggle="modal" data-bs-target="#addBookingModal">
                                Thêm Đơn Đặt
                            </button>
                            <button type="button" class="btn btn-sm btn-danger rounded-0 fw-bold"
                                    th:onclick="|deleteMulti('@{/api/bookings}', 'booking')|">
                                Xoá
                            </button>
                        </div>

                        <div class="mx-auto" style="min-width: 250px; max-width: 600px;">
                            <form id="searchForm" class="d-flex gap-2" onsubmit="loadTableData(0); return false;">
                                <input type="text" name="customerName" th:value="${customerName}"
                                       class="form-control form-control-sm rounded-0 shadow-none"
                                       placeholder="Tên khách hàng...">
                                <div class="input-group input-group-sm shadow-none" style="max-width: 180px;">
                                    <span class="input-group-text rounded-0 bg-light text-secondary">Từ</span>
                                    <input type="date" name="fromDate" th:value="${fromDate}"
                                           class="form-control rounded-0 shadow-none" title="Từ ngày dự kiến nhận">
                                </div>

                                <div class="input-group input-group-sm shadow-none" style="max-width: 180px;">
                                    <span class="input-group-text rounded-0 bg-light text-secondary">Đến</span>
                                    <input type="date" name="toDate" th:value="${toDate}"
                                           class="form-control rounded-0 shadow-none" title="Đến ngày dự kiến trả">
                                </div>
                                <button type="submit" class="btn btn-dark btn-sm rounded-0">Tìm</button>
                            </form>
                        </div>
                    </div>
                </th>
            </tr>
            <tr>
                <th style="width: 40px; vertical-align: middle;">
                    <input type="checkbox" onclick="selectAllCheckbox(this.id, 'action-select-booking')"
                           id="selectAllBooking">
                </th>
                <th class="text-start">Tên Khách Hàng</th>
                <th>Dự kiến Nhận</th>
                <th>Dự kiến Trả</th>
                <th>Thời gian thực nhận</th>
                <th>Thời gian thực trả</th>
                <th>Tổng Tiền</th>
                <th>Yêu cầu thêm</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${listBookings}">
                <td style="vertical-align: middle;">
                    <input type="checkbox" class="action-select-booking"
                           th:value="${b.id}"
                           th:data-id="${b.id}"
                           th:data-customer="${b.customerId}"
                           th:data-customername="${b.customerName}"
                           th:data-expectedcheckin="${b.expectedCheckIn}"
                           th:data-expectedcheckout="${b.expectedCheckOut}"
                           th:data-actualcheckin="${b.actualCheckIn != null ? #temporals.format(b.actualCheckIn, 'yyyy-MM-dd''T''HH:mm') : ''}"
                           th:data-actualcheckout="${b.actualCheckOut != null ? #temporals.format(b.actualCheckOut, 'yyyy-MM-dd''T''HH:mm') : ''}"
                           th:data-totalamount="${b.totalAmount}"
                           th:data-specialrequest="${b.specialRequest}"
                           th:data-status="${b.status}"
                           onclick="resetSelectAllCheckBox('selectAllBooking', 'action-select-booking')">
                </td>

                <td class="text-start fw-bold" th:text="${b.customerName}"></td>

                <td class="text-secondary small font-monospace"
                    th:text="${#temporals.format(b.expectedCheckIn, 'dd/MM/yyyy')}"></td>

                <td class="text-secondary small font-monospace"
                    th:text="${#temporals.format(b.expectedCheckOut, 'dd/MM/yyyy')}"></td>

                <td class="text-secondary small font-monospace"
                    th:text="${b.actualCheckIn != null ? #temporals.format(b.actualCheckIn, 'HH:mm - dd/MM/yyyy') : 'Chưa nhận phòng'}">
                </td>

                <td class="text-secondary small font-monospace"
                    th:text="${b.actualCheckOut != null ? #temporals.format(b.actualCheckOut, 'HH:mm - dd/MM/yyyy') : 'Chưa trả phòng'}">
                </td>

                <td class="fw-bold text-danger"
                    th:text="${b.totalAmount != null ? #numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}"></td>

                <td class="small text-muted"
                    style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                    th:title="${b.specialRequest}"
                    th:text="${b.specialRequest != null and !b.specialRequest.isEmpty() ? b.specialRequest : 'Không'}">
                </td>

                <td>
                    <span th:if="${b.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ xác nhận</span>
                    <span th:if="${b.status == 'CONFIRMED'}" class="badge bg-info text-dark">Đã xác nhận</span>
                    <span th:if="${b.status == 'CHECKED_IN'}" class="badge bg-primary">Đang lưu trú</span>
                    <span th:if="${b.status == 'CHECKED_OUT'}" class="badge bg-success">Đã trả phòng</span>
                    <span th:if="${b.status == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
                </td>

                <td>
                    <button type="button" class="btn btn-sm btn-dark rounded-0 me-1 fw-bold"
                            th:data-id="${b.id}"
                            th:data-customer="${b.customerId}"
                            th:data-customername="${b.customerName}"
                            th:data-expectedcheckin="${b.expectedCheckIn}"
                            th:data-expectedcheckout="${b.expectedCheckOut}"
                            th:data-actualcheckin="${b.actualCheckIn != null ? #temporals.format(b.actualCheckIn, 'yyyy-MM-dd''T''HH:mm') : ''}"
                            th:data-actualcheckout="${b.actualCheckOut != null ? #temporals.format(b.actualCheckOut, 'yyyy-MM-dd''T''HH:mm') : ''}"
                            th:data-totalamount="${b.totalAmount}"
                            th:data-specialrequest="${b.specialRequest}"
                            th:data-status="${b.status}"
                            onclick="openEditModal(this, 'Booking')">
                        Sửa
                    </button>

                    <button th:id="|deleteBooking-${b.id}|"
                            th:onclick="|deleteDetail('@{/api/bookings/{id}(id=${b.id})}')|" type="button"
                            class="btn btn-sm btn-danger rounded-0 fw-bold">Xoá
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(listBookings)}">
                <td colspan="10" class="text-muted py-4">Chưa có đơn đặt phòng nào trong hệ thống.</td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-center p-2 border-top bg-light"
             th:if="${not #lists.isEmpty(listPage)}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:each="page : ${listPage}">
                    <a class="page-link py-1 shadow-none"
                       th:href="@{/admin/bookings(page=${page},customerName=${customerName}, fromDate=${fromDate}, toDate=${toDate})}"
                       th:text="${page}">
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="~{modals/base :: genericModal(
        'addBookingModal',
        'Tạo đơn đặt phòng mới',
        ~{modals/booking_form :: bookingForm('add')}
    )}"></div>

    <div th:replace="~{modals/base :: genericModal(
        'editBookingModal',
        'Sửa thông tin đơn đặt phòng',
        ~{modals/booking_form :: bookingForm('edit')}
    )}"></div>


</div>
</body>
</html>
