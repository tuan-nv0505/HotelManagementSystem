<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .main {
            flex: 1;
        }
    </style>
</head>
<body class="bg-white text-dark" style="font-family: Arial, sans-serif; font-size: 14px;"
      th:fragment="main(pageTitle, activeMenu, content)">

<header th:replace="~{layout/header :: header}"></header>

<div class="container-fluid mt-4 main">
    <h3 class="mb-3 text-uppercase font-weight-bold text-secondary" th:text="${pageTitle}"></h3>
    <div class="row">

        <nav class="col-md-2 mb-4">
            <div class="list-group rounded-0 border">
                <a th:href="@{/admin/roominventory}" class="list-group-item list-group-item-action border-0 border-bottom"
                   th:classappend="${activeMenu == 'room_inventory' ? 'active bg-dark text-white' : 'text-dark bg-light'}">Kiểm kê phòng</a>
            </div>
        </nav>

        <main class="col-md-10">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>
</div>

<header th:replace="~{layout/footer :: footer}"></header>


<script>
    document.addEventListener("DOMContentLoaded", () => {
        var selectAllCheckbox = document.getElementById("selectAll");
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener("click", function () {
                var checkboxes = document.querySelectorAll(".action-select");
                checkboxes.forEach(function (cb) {
                    cb.checked = selectAllCheckbox.checked;
                });
            });
        }
    });
</script>
</body>
</html>
